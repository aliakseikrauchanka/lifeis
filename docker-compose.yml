services:
  # Client App
  entry-app:
    extends:
      file: docker-compose.base.yml
      service: nx-app-base
    command: npx nx run entry-app:serve --host=0.0.0.0
    ports:
      - ${CLIENT_PORT}:4200
      # PORT for million lint
      # - 42423:42423
    environment:
      - VITE_BE=${NGINX_DOMAIN}
      - VITE_CLIENT_ID=${CLIENT_ID}
      - VITE_FF_ENVIRONMENT=${FLAGSMITH_ENVIRONMENT}
      - VITE_SENTRY_DSN=${SENTRY_DSN}

  # Node.js Server App
  entry-server:
    extends:
      file: docker-compose.base.yml
      service: nx-app-base
    command: npx nx run entry-server:serve --host=0.0.0.0
    ports:
      - ${SERVER_PORT}:3000
    environment:
      - PORT=3000
      - DB_URI=${DB_URI}
      - REDIRECT_URL=${NGINX_DOMAIN}
      - CLIENT_ID=${CLIENT_ID}
      - CLIENT_SECRET=${CLIENT_SECRET}

      - LOGS_REDIRECT_URL=${LOGS_REDIRECT_URL}
      - LOGS_CLIENT_ID=${LOGS_CLIENT_ID}
      - LOGS_CLIENT_SECRET=${LOGS_CLIENT_SECRET}

      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - NOTION_API_KEY=${NOTION_API_KEY}
      - TELEGRAM_BOT_API_KEY=${TELEGRAM_BOT_API_KEY}
      - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS:-}

      - TRAINING_CLIENT_ID=${TRAINING_CLIENT_ID}
      - TRAINING_CLIENT_SECRET=${TRAINING_CLIENT_SECRET}
      - TRAINING_REDIRECT_URL=${TRAINING_REDIRECT_URL}

      - EXTENSION_ORIGIN=${EXTENSION_ORIGIN}
      - EXTENSION_CLIENT_ID=${EXTENSION_CLIENT_ID}
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - SERVICE_USER_ID=${SERVICE_USER_ID}

  logs-app:
    extends:
      file: docker-compose.base.yml
      service: nx-app-base
    command: npx nx run logs-app:serve --host=0.0.0.0
    ports:
      - ${LOGS_PORT}:4200
    environment:
      - VITE_BE=${NGINX_DOMAIN}
      - VITE_CLIENT_ID=${LOGS_CLIENT_ID}

  training-app:
    extends:
      file: docker-compose.base.yml
      service: nx-app-base
    command: npx nx run training-app:serve --host=0.0.0.0
    ports:
      - ${TRAINING_PORT}:4200
    environment:
      - VITE_BE=${NGINX_DOMAIN}
      - VITE_CLIENT_ID=${TRAINING_CLIENT_ID}

  logs-mcp-server:
    extends:
      file: docker-compose.base.yml
      service: nx-app-base
    command: npx nx run logs-mcp-server:serve --host=0.0.0.0
    ports:
      - ${MCP_PORT}:3000
    depends_on:
      - entry-server
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      # ver starnge that it works but ${NGINX_DOMAIN} did not
      - LIFEIS_BACKEND_URL=http://entry-server:3000
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}

  # telegram-bot:
  #   extends:
  #     file: docker-compose.base.yml
  #     service: nx-app-base
  #   command: npx nx run telegram-bot:serve
  #   depends_on:
  #     - entry-server
  #   environment:
  #     - NX_DAEMON=false
  #     - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
  #     - TELEGRAM_BOT_API_KEY=${TELEGRAM_BOT_API_KEY}
  #     - TELEGRAM_ALLOWED_CHAT_IDS=${TELEGRAM_ALLOWED_CHAT_IDS:-}
  #     - TRANSCRIPTION_DAILY_LIMIT=${TRANSCRIPTION_DAILY_LIMIT:-100}
  #     - BE_URL=https://lifeis-production.up.railway.app
  #     - TRANSCRIPTION_LANGUAGE=ru

volumes:
  mono-node-modules: null
